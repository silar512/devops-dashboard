name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd devops-dashboard || git clone https://github.com/silar512/devops-dashboard.git
          cd devops-dashboard
          git pull origin main
          sudo docker stop dashboard || true
          sudo docker rm dashboard || true
          sudo docker build -t dashboard .
          sudo docker run -d --restart=always -p 80:80 dashboard
